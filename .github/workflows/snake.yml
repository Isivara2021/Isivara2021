name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: isivara2021
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg

      - name: Deploy to output branch
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git fetch origin
          git checkout -B output

          cp dist/* .

          git add .
          git commit -m "generate snake animation" || echo "No changes"
          git push origin output --force
