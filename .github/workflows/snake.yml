name: Generate Premium Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate premium snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: isivara2021

          # Premium aesthetic palette
          palette: github-dark

          color_snake: "#00f5ff"
          color_dots: "#0f172a,#1e293b,#22c55e,#38bdf8,#f97316,#ef4444"

          outputs: |
            dist/snake.svg
            dist/snake-dark.svg
            dist/snake-glow.svg

      - name: Deploy to output branch
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git fetch origin
          git checkout -B output

          cp dist/* .

          git add .
          git commit -m "premium snake update" || echo "no changes"
          git push origin output --force
